name: Publish DSA Vault

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Debug secrets
        run: |
          if [ -z "$GOOGLE_APPLICATION_CREDENTIALS_JSON" ]; then
            echo "GOOGLE_APPLICATION_CREDENTIALS_JSON is EMPTY"
          else
            echo "GOOGLE_APPLICATION_CREDENTIALS_JSON is PRESENT"
          fi

          if [ -z "$GOOGLE_DRIVE_FOLDER_ID" ]; then
            echo "GOOGLE_DRIVE_FOLDER_ID is EMPTY"
          else
            echo "GOOGLE_DRIVE_FOLDER_ID is PRESENT"
          fi
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}

      - name: Sync Drive
        run: npm run sync-drive
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add content/problems

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Sync notes from Google Drive"
          git push